<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form — DemoApp</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f5f5f5; }
    nav { background: #2c3e50; padding: 16px 32px; display: flex; gap: 24px; }
    nav a { color: #ecf0f1; text-decoration: none; font-weight: 500; }
    nav .logo { color: white; font-weight: 700; font-size: 18px; margin-right: auto; }
    .container { max-width: 700px; margin: 40px auto; padding: 0 24px; }
    .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { font-size: 28px; margin-bottom: 8px; }
    .subtitle { color: #888; margin-bottom: 32px; }
    .form-group { margin-bottom: 20px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; color: #444; }
    label .required { color: #e74c3c; margin-left: 2px; }
    input[type="text"], input[type="email"], input[type="date"], select, textarea {
      width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px;
      font-size: 15px; font-family: inherit; outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: #3498db; }
    textarea { height: 100px; resize: vertical; }
    .checkbox-group { display: flex; align-items: center; gap: 10px; }
    .checkbox-group input[type="checkbox"] { width: 18px; height: 18px; }
    .checkbox-group label { margin-bottom: 0; font-weight: 400; }
    .btn-submit { padding: 14px 32px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .btn-submit:hover { background: #2980b9; }
    .success { background: #e8f8f0; border: 1px solid #27ae60; color: #1a7a3b; padding: 20px; border-radius: 8px; margin-bottom: 24px; }
    .result-card { background: #f9f9f9; padding: 20px; border-radius: 8px; margin-top: 24px; }
    .result-card pre { font-family: monospace; font-size: 13px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <nav>
    <span class="logo">🤖 DemoApp</span>
    <a href="/">Home</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/form" id="nav-form">Contact</a>
    <a href="/login">Login</a>
  </nav>

  <div class="container">
    <div class="card">
      <h1>Contact Us</h1>
      <p class="subtitle">Fill out the form below and we'll get back to you.</p>

      {% if submitted %}
      <div class="success" id="form-success">
        ✓ Form submitted successfully!
      </div>
      <div class="result-card">
        <strong>Submitted data:</strong>
        <pre id="submitted-data">{{ data | tojson(indent=2) }}</pre>
      </div>
      {% endif %}

      <form id="contact-form" method="post" action="/form">
        <div class="form-row">
          <div class="form-group">
            <label for="name">Full Name <span class="required">*</span></label>
            <input type="text" id="name" name="name" placeholder="John Smith" required>
          </div>
          <div class="form-group">
            <label for="email">Email Address <span class="required">*</span></label>
            <input type="email" id="email" name="email" placeholder="john@example.com" required>
          </div>
        </div>

        <div class="form-group">
          <label for="department">Department</label>
          <select id="department" name="department">
            <option value="">Select a department...</option>
            <option value="sales">Sales</option>
            <option value="support">Support</option>
            <option value="engineering">Engineering</option>
            <option value="billing">Billing</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="contact_date">Preferred Contact Date</label>
          <input type="date" id="contact_date" name="contact_date">
        </div>

        <div class="form-group">
          <label for="message">Message <span class="required">*</span></label>
          <textarea id="message" name="message" placeholder="Tell us how we can help you..." required></textarea>
        </div>

        <div class="form-group">
          <div class="checkbox-group">
            <input type="checkbox" id="subscribe" name="subscribe" value="yes">
            <label for="subscribe">Subscribe to newsletter</label>
          </div>
        </div>

        <button type="submit" id="form-submit" class="btn-submit">Send Message</button>
      </form>
    </div>
  </div>
</body>
</html>
